<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TrueNorth Viz</title>

    <!-- Fonts (match landing: IBM Plex Mono for UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">


    
    <style>
      :root{
        --paper: #F5F0E8;
        --paper2:#F0E8DC;
        --ink:   #111827;
        --muted: rgba(15,23,42,0.60);
        --line:  rgba(15,23,42,0.10);
        --line2: rgba(15,23,42,0.06);

        --mint:     #2D8B7A;
        --mintDark: #256F62;

        --glow:     var(--mintDark);
        --font-main: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --ui: var(--font-main);
        --digits: var(--font-main);
      }

      html, body { height: 100%; }
      body{
        margin: 0;
        font-family: var(--ui);
        background: radial-gradient(1200px 600px at 50% 0%, #ffffff 0%, var(--paper) 55%, var(--paper2) 100%);
        color: var(--ink);
      }

      #wrap{
        max-width: 1400px;
        margin: 0 auto;
        padding: 28px 28px 36px;
        position: relative;
      }

      #topbar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 14px;
        margin-bottom: 12px;
      }

      #hint{
        color: var(--muted);
        font-size: 11px;
        font-family: var(--ui);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      #vizContainer{
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative; /* allow spatial legend to be absolutely placed in whitespace */
      }

      .row{
        display:flex;
        align-items:center;
        gap:10px;
        margin: 10px 0 10px;
        flex-wrap: wrap;
      }

      button{
        font-family: var(--ui);
        font-weight: 600;
        font-size: 13px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255,255,255,0.70);
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background 120ms ease;
        box-shadow: 0 1px 0 rgba(15,23,42,0.04);
      }
      button:hover{
        transform: translateY(-1px);
        border-color: rgba(15,23,42,0.16);
        box-shadow: 0 10px 28px rgba(15,23,42,0.10);
      }
      button.active{
        background: rgba(0,128,128,0.18);
        border-color: rgba(0,128,128,0.42);
        box-shadow: 0 10px 28px rgba(0,128,128,0.14);
      }
      button.ghost{
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 12px;
      }

      /* Brand-colored New Session button */
      #btnNewSession{
        background: var(--mint);
        border-color: var(--mintDark);
        color: #ffffff;
        box-shadow: 0 2px 6px rgba(0,128,128,0.25);
      }

      #btnNewSession:hover{
        background: #006666;
        border-color: #006666;
        box-shadow: 0 4px 10px rgba(0,128,128,0.35);
        transform: translateY(-1px);
      }

      #graphTitleWrap{
        position: relative;
        height: 22px;
        margin: 10px 0 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      
      /* Ensure title stays centered even with timeRow on left */
      #graphTitleWrap #title{
        flex: 1;
        text-align: center;
        max-width: calc(100% - 280px); /* Leave space for timeRow (200px scrubber + 50px label + 30px gap) */
        margin: 0 auto;
      }
      #title{
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: var(--ui);
        font-weight: 600;
        font-size: 13px;
        color: rgba(0,0,0,0.75);
        max-width: 100%;
      }

      #chart{
        width: 100%;
        max-width: 100%;
        display: block;
        margin: 0 auto;
      }

      /* Notes: bottom-right under graph, minimal */
      .notes-under-graph{
        position: relative;
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        margin-top: 8px;
      }
      .btn-notes-toggle{
        font-family: var(--ui);
        font-size: 11px;
        color: var(--muted);
        background: transparent;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
      }
      .btn-notes-toggle:hover{
        color: var(--ink);
        border-color: var(--mint);
        background: rgba(0,128,128,0.06);
      }
      .btn-notes-toggle[aria-expanded="true"]{
        color: var(--mint);
        border-style: solid;
        border-color: var(--mint);
      }
      .notes-panel{
        width: 100%;
        max-width: 520px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        overflow: visible;
      }
      .notes-split{
        display: flex;
        gap: 16px;
        min-height: 140px;
        align-items: stretch;
      }
      .notes-half{
        flex: 1;
        min-width: 0;
        display: flex;
        justify-content: flex-start;
      }
      .notes-half:last-child{
        border-right: none;
      }
      .sticky-note{
        position: relative;
        background: #E0F2EF; /* light teal paper */
        border-radius: 10px;
        border: 1px solid rgba(45,139,122,0.35);
        box-shadow: 0 10px 24px rgba(15,23,42,0.18);
        margin: 6px;
        padding: 12px 16px 16px;
        min-height: 150px;
        transform-origin: center;
        z-index: 1;
      }
      .sticky-note.track{
        transform: rotate(-2deg);
      }
      .sticky-note.ref{
        transform: rotate(2deg);
      }
      .sticky-note::before{
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 18px;
        background: linear-gradient(to bottom, rgba(255,255,255,0.65), rgba(224,242,239,0.0));
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        pointer-events: none;
      }
      /* single folded teal corner + its shadow */
      .sticky-note::after{
        content: '';
        position: absolute;
        top: -4px;
        right: -4px;
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #2D8B7A 0%, #226d5f 70%);
        clip-path: polygon(0 0, 100% 0, 0 100%);
        box-shadow: 0 8px 14px rgba(15,23,42,0.35);
        border-top-right-radius: 6px;
        border-bottom-left-radius: 6px;
        pointer-events: none;
      }
      .notes-label{
        font-family: var(--ui);
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 10px 14px 6px;
        flex-shrink: 0;
      }
      .notes-input{
        width: 100%;
        min-height: 72px;
        padding: 8px 14px 12px;
        font-family: var(--ui);
        font-size: 13px;
        line-height: 1.5;
        color: var(--ink);
        background: transparent;
        border: none;
        resize: vertical;
        outline: none;
        box-sizing: border-box;
        flex: 1;
      }
      .notes-input::placeholder{
        color: var(--muted);
      }
      .notes-under-graph.notes-delayed{
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      svg{
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(248, 248, 248, 0.95);
        box-shadow: 0 18px 55px rgba(15,23,42,0.06);
      }
      svg, text {
        font-family: var(--ui);
      }

      /* Axis + tick styling on light panel */
      #chart g.tick text{
        fill: rgba(15,23,42,0.72);
        font-size: 10px;
        letter-spacing: 0.02em;
      }
      #chart .label{
        fill: rgba(15,23,42,0.82);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.10em;
      }

      /* Brush selection (region select box) */
      #chart .brush .selection{
        stroke: #2D8B7A;
        stroke-width: 1.2px;
        stroke-opacity: 0.95;
        fill: rgba(45,139,122,0.15);
      }

      #timeRow.timeBottom{
        width: 100%;
        margin-top: 14px;

        /* match your D3 margin convention */
        padding-left: 56px;
        padding-right: 20px;

        display: flex;
        align-items: center;
        gap: 14px;
      }
      
      /* Time scrubber at top left, next to title */
      #timeRow.timeTop{
        position: absolute;
        left: 0;
        top: 0;
        width: auto;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 10;
      }
      
      #timeScrub{
        width: 100%;
        accent-color: var(--glow);
      }
      
      /* Shorter scrubber for top position */
      #timeRow.timeTop #timeScrub{
        width: 200px; /* Significantly shorter to fit next to title */
      }
      
      #timeLabel{
        font-family: var(--digits);
        font-variant-numeric: tabular-nums;
        min-width: 60px;
        text-align: right;
        color: rgba(15,23,42,0.72);
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      
      /* Compact label for top position */
      #timeRow.timeTop #timeLabel{
        min-width: 50px;
        text-align: left;
        font-size: 11px;
      }

      #tooltip{
        position: fixed;
        pointer-events: none;
        opacity: 0;

        background: rgba(6,10,18,0.78);
        color: rgba(248,250,252,0.92);
        padding: 10px 12px;
        border-radius: 14px;

        font-size: 12px;
        line-height: 1.55;
        max-width: 300px;

        transform: translate(12px, 12px);

        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        border: 1px solid rgba(248,250,252,0.12);
        box-shadow: 0 18px 60px rgba(15,23,42,0.28);
      }
      #tooltip b{ color: rgba(248,250,252,0.96); }
      body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

      #errorMessage{
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 16px;
      }

      #errorMessage a{
        color: var(--mintDark);
        text-decoration: none;
        font-weight: 600;
      }

      #errorMessage a:hover{
        text-decoration: underline;
      }

      /* 2-column layout for chart and sidebar */
      #mainLayout{
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        align-items: start;
      }

      #chartColumn{
        display: flex;
        flex-direction: column;
        min-width: 0; /* Prevent grid overflow */
        position: relative; /* allow absolute legend in right whitespace */
      }

      /* Sidebar styling */
      #sidebar{
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 12px rgba(15,23,42,0.06);
        display: flex;
        flex-direction: column;
        gap: 20px;
        position: sticky;
        top: 20px;
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        overflow-x: hidden;
        box-sizing: border-box;
        min-width: 0;
      }

      /* Sidebar tabs */
      #sidebarTabs{
        display: flex;
        flex-direction: row;
        gap: 6px;
        flex-wrap: wrap;
      }

      #sidebarTabs button{
        flex: 1 1 calc(50% - 6px);
        min-width: 74px;
        max-width: 100%;
        text-align: center;
        padding: 8px 8px;
        font-size: 11px;
        font-family: var(--ui);
        text-transform: uppercase;
        letter-spacing: 0.10em;
        overflow: visible;
        white-space: nowrap;
        box-sizing: border-box;
      }

      #sidebarTabs button.active{
        background: #2D8B7A;
        color: #F5F0E8;
        border-color: #256F62;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 14px 30px rgba(0,0,0,0.45);
      }

      /* Documentation section */
      #tabDocs{
        padding-top: 12px;
        border-top: 1px solid var(--line2);
        word-wrap: break-word;
        overflow-wrap: break-word;
        max-width: 100%;
      }

      #tabDocs h3{
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        margin: 0 0 8px 0;
        letter-spacing: 0.02em;
        line-height: 1.3;
      }

      #tabDocs .docs-header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:8px;
        margin-bottom:6px;
      }

      #tabDocs .docs-help-toggle{
        border-radius:999px;
        width:22px;
        height:22px;
        padding:0;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        font-size:11px;
        text-transform:none;
        letter-spacing:0;
        background: transparent;
        border:1px solid var(--line);
      }

      #tabDocs .docs-help-toggle[aria-expanded="true"]{
        background:#2D8B7A;
        color:#F5F0E8;
        border-color:#256F62;
      }

      #tabDocs ul{
        margin: 0;
        padding-left: 18px;
        list-style-type: disc;
      }

      #tabDocs li{
        font-family: var(--ui);
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
        margin-bottom: 6px;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      #tabDocs li:last-child{
        margin-bottom: 0;
      }

      #tabDocs a{
        display: inline-block;
        margin-top: 12px;
      }

      /* Delta Summary (Track vs Reference) */
      #deltaSummaryWrap{
        padding-top: 14px;
        margin-top: 14px;
        border-top: 1px solid var(--line2);
        max-width: 100%;
      }
      #deltaSummaryWrap .delta-summary-title{
        font-family: var(--ui);
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin: 0 0 8px 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: default;
      }
      #deltaSummaryWrap .delta-summary-line{
        font-family: var(--ui);
        font-size: 12px;
        line-height: 1.5;
        color: var(--ink);
        padding: 6px 0;
        cursor: pointer;
        transition: color 0.15s ease, background 0.15s ease;
        border-radius: 4px;
        padding-left: 4px;
        margin-left: -4px;
        display:flex;
        align-items:baseline;
        justify-content:space-between;
        gap:8px;
      }
      #deltaSummaryWrap .delta-summary-line:hover{
        color: var(--mint);
      }

      #deltaSummaryWrap .delta-label{
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      #deltaSummaryWrap .delta-value{
        font-size: 1.2rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--mint);
        white-space: nowrap;
      }

      #deltaSummaryWrap .delta-value.neg{
        color: #C4813A;
      }

      #deltaSummaryWrap .delta-value.na{
        color: var(--muted);
        font-weight: 500;
      }

      /* Region Stats wrapper in sidebar */
      #regionStatsWrap{
        margin-top: 8px;
        padding-top: 18px;
        border-top: 1px dashed var(--line2);
        overflow-x: hidden;
        overflow-y: visible;
        box-sizing: border-box;
        min-width: 0;
        max-width: 100%;
      }

      #regionStatsWrap:empty{
        display: none;
      }

      /* Responsive: stack sidebar below chart on smaller screens */
      @media (max-width: 1200px){
        #mainLayout{
          grid-template-columns: 1fr;
          gap: 20px;
        }

        #sidebar{
          position: static;
          max-height: none;
        }
      }

    </style>
    
  </head>

  <body>
    <div id="wrap">
      <div id="topbar">
        <div id="hint">Press <b>Tab</b> to switch Track/Reference</div>
        <button id="btnNewSession" class="ghost" onclick="window.location.href='index.html'">
          Start a new session
        </button>
      </div>

      <!-- Error message (hidden by default, shown if no data) -->
      <div id="errorMessage" style="display: none;">
        No session loaded. <a href="index.html">Upload files</a>
      </div>

      <!-- Viz UI (hidden by default, shown when data is loaded) -->
      <div id="vizUI" style="display: none;">
        <!-- 2-column layout: chart on left, sidebar on right -->
        <div id="mainLayout">
          <!-- Left column: chart area -->
          <div id="chartColumn">
            <!-- ✅ Track/Reference controls (ONLY ONCE) -->
            <div class="row">
              <button id="btnTrack" class="active">Track</button>
              <button id="btnRef">Reference</button>
              <button id="btnOverlay" type="button" aria-pressed="false" style="margin-left:auto;">Overlay</button>
            </div>

            <div id="vizContainer">
              <div id="graphTitleWrap">
                <div id="timeRow" class="timeTop">
                  <input id="timeScrub" type="range" min="0" max="100" value="100" />
                  <div id="timeLabel">00:00</div>
                </div>
                <div id="title">Track: —</div>
              </div>

              <svg id="chart" width="960" height="540"></svg>
              <div id="notesWrap" class="notes-under-graph notes-delayed" aria-hidden="true">
                <button type="button" id="btnNotesToggle" class="btn-notes-toggle" aria-expanded="false">+ notes</button>
                <div id="notesPanel" class="notes-panel" hidden>
                  <div class="notes-split">
                    <div class="notes-half">
                      <label class="notes-label" for="notesTrack">Track</label>
                      <textarea id="notesTrack" class="notes-input" placeholder="One point per line" rows="4"></textarea>
                    </div>
                    <div class="notes-half">
                      <label class="notes-label" for="notesRef">Reference</label>
                      <textarea id="notesRef" class="notes-input" placeholder="One point per line" rows="4"></textarea>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right column: sidebar -->
          <aside id="sidebar">
            <!-- Tab buttons moved here -->
            <div id="sidebarTabs">
              <button id="btnVizSpatial" class="active">Spatial</button>
              <button id="btnVizLoudness">Loudness</button>
              <button id="btnVizCrest">Crest</button>
              <button id="btnVizLowEnd">Low End</button>
            </div>

            <!-- Documentation section (updates based on active tab) -->
            <div id="tabDocs"></div>

            <!-- Delta Summary (Track vs Reference); lines filled by JS -->
            <div id="deltaSummaryWrap" class="delta-summary-wrap" title="Largest delta per tab across full track.">
              <h3 class="delta-summary-title">Delta Summary (Track vs Reference)</h3>
              <div id="deltaSummaryLines"></div>
            </div>

            <!-- Region Stats container (only visible for Spatial tab) -->
            <div id="regionStatsWrap"></div>
          </aside>
        </div>
      </div>
    </div>

    <div id="tooltip"></div>

    <!-- Load D3 once -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="./apiConfig.js"></script>
    <!-- Load upload handler -->
    <script src="./uploadHandler.js"></script>
    <!-- Load viz system (production loader) -->
    <script src="./vizLoader.js"></script>
    <!-- Prototype UI wiring (demo only) -->
    <script src="./vizShell.js"></script>
  </body>
</html>
